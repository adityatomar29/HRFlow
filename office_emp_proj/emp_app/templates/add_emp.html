<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">

    <title>Add An Employee</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            min-height:100vh;
            background:linear-gradient(135deg,#f4f7fc,#e9eef8);
            font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
        }

        .form-card{
            width:100%;
            max-width:850px;
            background:#fff;
            padding:40px;
            border-radius:24px;
            box-shadow:0 15px 40px rgba(0,0,0,0.08);
        }

        .header-section{
            text-align:center;
            margin-bottom:35px;
        }

        .header-section h1{
            font-size:2.4rem;
            font-weight:700;
            color:#1f2937;
            margin-bottom:10px;
        }

        .header-section p{
            color:#6b7280;
            margin-bottom:15px;
        }

        .divider{
            width:80px;
            height:4px;
            background:#0d6efd;
            border-radius:10px;
            margin:auto;
        }

        .form-label{
            font-weight:600;
            color:#374151;
            margin-bottom:8px;
        }

        .form-control{
            height:50px;
            border-radius:12px;
            border:1px solid #d1d5db;
            transition:all 0.3s ease;
        }

        .form-control:focus{
            border-color:#0d6efd;
            box-shadow:0 0 0 0.15rem rgba(13,110,253,0.15);
        }

        .form-grid{
            display:grid;
            grid-template-columns:repeat(2,1fr);
            gap:20px;
        }

        .full-width{
            grid-column:1/-1;
        }

        .btn-submit{
            width:100%;
            height:52px;
            border:none;
            border-radius:12px;
            background:#0d6efd;
            color:#fff;
            font-size:1rem;
            font-weight:600;
            transition:all 0.3s ease;
        }

        .btn-submit:hover{
            transform:translateY(-2px);
            box-shadow:0 10px 20px rgba(13,110,253,0.25);
        }

        @media (max-width:768px){

            .form-card{
                padding:30px 22px;
            }

            .header-section h1{
                font-size:2rem;
            }

            .form-grid{
                grid-template-columns:1fr;
            }
        }

        @media (max-width:480px){

            .form-card{
                padding:25px 18px;
            }

            .header-section h1{
                font-size:1.7rem;
            }
        }
    </style>
</head>

<body>

<div class="form-card">

    <div class="header-section">
        <h1>Add Employee</h1>
        <p>Enter employee details to create a new record.</p>
        <div class="divider"></div>
    </div>

    <form action="/add_emp" method="post">
        {% csrf_token %}

        <div class="form-grid">

            <div>
                <label for="first_name" class="form-label">
                    First Name
                </label>
                <input
                    type="text"
                    class="form-control"
                    id="first_name"
                    name="first_name"
                    value="{{first_name}}">
            </div>

            <div>
                <label for="last_name" class="form-label">
                    Last Name
                </label>
                <input
                    type="text"
                    class="form-control"
                    id="last_name"
                    name="last_name"
                    value="{{last_name}}">
            </div>

            <div>
                <label for="phone" class="form-label">
                    Mobile Number
                </label>
                <input
                    type="number"
                    class="form-control"
                    id="phone"
                    name="phone"
                    value="{{phone}}">
            </div>

            <div>
                <label for="salary" class="form-label">
                    Salary
                </label>
                <input
                    type="number"
                    class="form-control"
                    id="salary"
                    name="salary"
                    value="{{salary}}">
            </div>

            <div>
                <label for="dept" class="form-label">
                    Department ID
                </label>
                <input
                    type="number"
                    class="form-control"
                    id="dept"
                    name="dept"
                    value="{{dept}}">
            </div>

            <div>
                <label for="role" class="form-label">
                    Role ID
                </label>
                <input
                    type="number"
                    class="form-control"
                    id="role"
                    name="role"
                    value="{{role}}">
            </div>

            <div class="full-width">
                <label for="bonus" class="form-label">
                    Bonus
                </label>
                <input
                    type="number"
                    class="form-control"
                    id="bonus"
                    name="bonus"
                    value="{{bonus}}">
            </div>

            <div class="full-width mt-3">
                <button type="submit" class="btn-submit">
                    Add Employee
                </button>
            </div>

        </div>
    </form>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
