<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Add Employee | HR Flow</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0d6efd;
            --primary-dark: #0b5ed7;
            --bg: #f4f7fc;
            --text: #1f2937;
            --muted: #6b7280;
        }

        /* ======================
    ANIMATIONS
====================== */

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideLeft {
            from {
                opacity: 0;
                transform: translateX(-40px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes float {
            0% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-8px);
            }

            100% {
                transform: translateY(0);
            }
        }

        @keyframes bgMove {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        /* ======================
    BODY
====================== */

        body {
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;

            background: linear-gradient(-45deg,
                    #f4f7fc,
                    #e9eef8,
                    #f8fbff,
                    #edf4ff);

            background-size: 400% 400%;
            animation: bgMove 12s ease infinite;
        }

        /* ======================
    LAYOUT
====================== */

        .wrapper {
            display: flex;
            min-height: 100vh;
        }

        /* ======================
    SIDEBAR
====================== */

        .sidebar {
            width: 260px;
            background: white;
            padding: 30px 20px;

            box-shadow: 5px 0 30px rgba(0, 0, 0, .05);

            animation: slideLeft .8s ease;
        }

        .brand {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 40px;
            text-align: center;
        }

        .nav-link-custom {
            display: block;

            text-decoration: none;

            color: var(--text);

            padding: 14px 18px;

            margin-bottom: 12px;

            border-radius: 14px;

            transition: .3s;
        }

        .nav-link-custom:hover {
            background: var(--primary);
            color: white;
            transform: translateX(5px);
        }

        .nav-link-custom.active {
            background: var(--primary);
            color: white;
        }

        .home-btn {
            display: block;

            text-align: center;

            margin-top: 30px;

            padding: 14px;

            border-radius: 14px;

            text-decoration: none;

            background: #eef5ff;

            color: var(--primary);

            font-weight: 600;

            transition: .3s;
        }

        .home-btn:hover {
            background: var(--primary);
            color: white;
        }

        /* ======================
    MAIN CONTENT
====================== */

        .content {
            flex: 1;

            display: flex;
            justify-content: center;
            align-items: center;

            padding: 40px;
        }

        .form-card {

            width: 100%;
            max-width: 900px;

            background: rgba(255, 255, 255, 0.9);

            backdrop-filter: blur(15px);

            border-radius: 28px;

            padding: 45px;

            box-shadow:
                0 20px 60px rgba(0, 0, 0, .08);

            animation: fadeUp 1s ease;
        }

        /* ======================
    HEADER
====================== */

        .header-section {
            text-align: center;
            margin-bottom: 35px;
        }

        .header-section h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--text);
        }

        .header-section p {
            color: var(--muted);
        }

        .divider {
            width: 90px;
            height: 4px;

            background: var(--primary);

            border-radius: 10px;

            margin: 18px auto;

            animation: float 3s infinite;
        }

        /* ======================
    FORM
====================== */

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 22px;
        }

        .full-width {
            grid-column: 1/-1;
        }

        .form-label {
            font-weight: 600;
            color: #374151;
            margin-bottom: 8px;
        }

        .form-control {

            height: 54px;

            border-radius: 14px;

            border: 1px solid #d6dce5;

            transition: .3s;

            padding: 12px 15px;
        }

        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 .2rem rgba(13, 110, 253, .15);
        }

        /* ======================
    BUTTON
====================== */

        .btn-submit {

            width: 100%;

            height: 55px;

            border: none;

            border-radius: 14px;

            background: var(--primary);

            color: white;

            font-weight: 600;

            transition: .3s;
        }

        .btn-submit:hover {

            background: var(--primary-dark);

            transform: translateY(-3px);

            box-shadow:
                0 15px 30px rgba(13, 110, 253, .25);
        }

        /* ======================
    RESPONSIVE
====================== */

        @media(max-width:992px) {

            .wrapper {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
            }

            .content {
                padding: 20px;
            }
        }

        @media(max-width:768px) {

            .form-grid {
                grid-template-columns: 1fr;
            }

            .header-section h1 {
                font-size: 2rem;
            }

            .form-card {
                padding: 30px 22px;
            }
        }

        @media(max-width:480px) {

            .form-card {
                padding: 22px 16px;
            }

            .header-section h1 {
                font-size: 1.7rem;
            }
        }
    </style>
</head>

<body>

    <div class="wrapper">

        <!-- SIDEBAR -->

        <aside class="sidebar">

            <div class="brand">
                HR Flow
            </div>

            <a href="/all_emp" class="nav-link-custom">
                👥 View Employees
            </a>

            <a href="/add_emp" class="nav-link-custom active">
                ➕ Add Employee
            </a>

            <a href="/remove_emp" class="nav-link-custom">
                ❌ Remove Employee
            </a>

            <a href="/filter_emp" class="nav-link-custom">
                🔍 Filter Employees
            </a>

            <a href="/" class="home-btn">
                ← Back To Home
            </a>

        </aside>

        <!-- CONTENT -->

        <main class="content">

            <div class="form-card">

                <div class="header-section">

                    <h1>Add Employee</h1>

                    <p>
                        Enter employee information to create a new record
                        in the Employee Management System.
                    </p>

                    <div class="divider"></div>

                </div>

                <form action="/add_emp" method="post">

                    {% csrf_token %}

                    <div class="form-grid">

                        <div>
                            <label class="form-label">
                                First Name
                            </label>

                            <input type="text" class="form-control" name="first_name" value="{{first_name}}">
                        </div>

                        <div>
                            <label class="form-label">
                                Last Name
                            </label>

                            <input type="text" class="form-control" name="last_name" value="{{last_name}}">
                        </div>

                        <div>
                            <label class="form-label">
                                Mobile Number
                            </label>

                            <input type="number" class="form-control" name="phone" value="{{phone}}">
                        </div>

                        <div>
                            <label class="form-label">
                                Salary
                            </label>

                            <input type="number" class="form-control" name="salary" value="{{salary}}">
                        </div>

                        <div>
                            <label class="form-label">
                                Department
                            </label>

                            <select class="form-control" name="dept" required>

                                <option value="">
                                    Select Department
                                </option>

                                {% for dept in departments %}

                                <option value="{{ dept.id }}">
                                    {{ dept.name }}
                                </option>

                                {% endfor %}

                            </select>
                        </div>

                        <div>
                            <label class="form-label">
                                Role
                            </label>

                            <select class="form-control" name="role" required>

                                <option value="">
                                    Select Role
                                </option>

                                {% for role in roles %}

                                <option value="{{ role.id }}">
                                    {{ role.name }}
                                </option>

                                {% endfor %}

                            </select>
                        </div>

                        <div class="full-width">

                            <label class="form-label">
                                Bonus
                            </label>

                            <input type="number" class="form-control" name="bonus" value="{{bonus}}">
                        </div>

                        <div class="full-width mt-3">

                            <button type="submit" class="btn-submit">

                                Add Employee
                            </button>

                        </div>

                    </div>

                </form>

            </div>

        </main>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
