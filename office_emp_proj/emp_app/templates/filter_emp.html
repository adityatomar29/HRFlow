<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.rtl.min.css" integrity="sha384-CfCrinSRH2IR6a4e6fy2q6ioOX7O6Mtm1L9vRvFZ1trBncWmMePhzvafv7oIcWiW" crossorigin="anonymous">
    <title>Filter An Employee</title>
</head>
<body>
    <div class="container">
        <h1>Filter Employee Detail </h1>
        <hr>

        <form action="/filter_emp" method="post">
            {% csrf_token %} <!-- Security purpose  -->
            
    <label for="name" class="form-label">Employee First/Last Name</label><br>
    <input type="text" id="name" name="name" value="{{name}}"><br>

    <label for="dept" class="form-label">Department</label><br>
    <input type="text" id="dept" name="dept" value="{{dept}}"><br>

    <label for="role" class="form-label">Role</label><br>
    <input type="text" id="role" name="role" value="{{role}}"><br>

    <hr>
  <button type="submit" class="btn btn-primary">Submit</button>
</form>
    </div>
    
</body>
</html>
