<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">

    <title>Filter Employee</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            min-height:100vh;
            background:linear-gradient(135deg,#f4f7fc,#e9eef8);
            font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
        }

        .filter-card{
            width:100%;
            max-width:750px;
            background:#ffffff;
            padding:40px;
            border-radius:24px;
            box-shadow:0 15px 40px rgba(0,0,0,0.08);
        }

        .header-section{
            text-align:center;
            margin-bottom:35px;
        }

        .header-section h1{
            font-size:2.4rem;
            font-weight:700;
            color:#1f2937;
            margin-bottom:10px;
        }

        .header-section p{
            color:#6b7280;
            margin-bottom:15px;
        }

        .divider{
            width:80px;
            height:4px;
            background:#0d6efd;
            border-radius:10px;
            margin:auto;
        }

        .form-label{
            font-weight:600;
            color:#374151;
            margin-bottom:8px;
        }

        .form-control{
            height:52px;
            border-radius:12px;
            border:1px solid #d1d5db;
            transition:all 0.3s ease;
        }

        .form-control:focus{
            border-color:#0d6efd;
            box-shadow:0 0 0 0.15rem rgba(13,110,253,0.15);
        }

        .form-group{
            margin-bottom:22px;
        }

        .btn-filter{
            width:100%;
            height:54px;
            border:none;
            border-radius:12px;
            background:#0d6efd;
            color:#fff;
            font-size:1rem;
            font-weight:600;
            transition:all 0.3s ease;
        }

        .btn-filter:hover{
            transform:translateY(-2px);
            box-shadow:0 10px 20px rgba(13,110,253,0.25);
        }

        .search-tip{
            background:#f8faff;
            border-left:4px solid #0d6efd;
            padding:14px 16px;
            border-radius:10px;
            margin-bottom:25px;
            color:#4b5563;
            font-size:0.95rem;
        }

        @media (max-width:768px){

            .filter-card{
                padding:30px 22px;
            }

            .header-section h1{
                font-size:2rem;
            }
        }

        @media (max-width:480px){

            .filter-card{
                padding:24px 18px;
            }

            .header-section h1{
                font-size:1.7rem;
            }

            .header-section p{
                font-size:0.95rem;
            }
        }
    </style>
</head>

<body>

<div class="filter-card">

    <div class="header-section">
        <h1>Filter Employees</h1>
        <p>Search employees using name, department, or role.</p>
        <div class="divider"></div>
    </div>

    <div class="search-tip">
        Leave any field blank if you don't want to filter by that criterion.
    </div>

    <form action="/filter_emp" method="post">
        {% csrf_token %}

        <div class="form-group">
            <label for="name" class="form-label">
                Employee First / Last Name
            </label>
            <input
                type="text"
                class="form-control"
                id="name"
                name="name"
                value="{{name}}"
                placeholder="Enter employee name">
        </div>

        <div class="form-group">
            <label for="dept" class="form-label">
                Department
            </label>
            <input
                type="text"
                class="form-control"
                id="dept"
                name="dept"
                value="{{dept}}"
                placeholder="Enter department name">
        </div>

        <div class="form-group">
            <label for="role" class="form-label">
                Role
            </label>
            <input
                type="text"
                class="form-control"
                id="role"
                name="role"
                value="{{role}}"
                placeholder="Enter role name">
        </div>

        <button type="submit" class="btn-filter">
            Search Employees
        </button>

    </form>

</div>

</body>
</html>
